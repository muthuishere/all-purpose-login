version: '3'

vars:
  BINARY: apl
  MODULE: github.com/muthuishere/all-purpose-login
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: -s -w -X {{.MODULE}}/internal/version.Version={{.VERSION}} -X {{.MODULE}}/internal/version.Commit={{.COMMIT}} -X {{.MODULE}}/internal/version.Date={{.DATE}}

tasks:
  default:
    cmds:
      - task: test

  tidy:
    cmds:
      - go mod tidy

  build:
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY}} ./cmd/apl

  install:
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" ./cmd/apl

  test:
    cmds:
      - go test ./...

  test:verbose:
    cmds:
      - go test -v ./...

  test:cover:
    cmds:
      - go test -cover ./...

  fmt:
    cmds:
      - gofmt -s -w .

  vet:
    cmds:
      - go vet ./...

  run:
    cmds:
      - go run ./cmd/apl {{.CLI_ARGS}}

  clean:
    cmds:
      - rm -rf bin/ .e2e-out/

  e2e:ms:
    desc: "Run the MS Graph end-to-end smoke script (needs az login + apl setup done)."
    deps: [build]
    cmds:
      - ./tests/e2e/ms_smoke.sh {{.CLI_ARGS}}

  e2e:google:
    desc: "Run the Google end-to-end smoke script (needs gcloud auth + apl setup google done)."
    deps: [build]
    cmds:
      - ./tests/e2e/google_smoke.sh {{.CLI_ARGS}}

  e2e:github:
    desc: "Run GitHub smoke (requires `gh auth` + optional APL_SMOKE_REPO env)."
    deps: [build]
    cmds:
      - ./tests/e2e/github_smoke.sh

  e2e:brief:
    desc: "Run Morning Brief aggregate smoke (pass google:handle ms:handle as args)."
    deps: [build]
    cmds:
      - ./tests/e2e/morning_brief_smoke.sh {{.CLI_ARGS}}

  e2e:all:
    desc: "Run every e2e smoke (ms, google, github, brief)."
    deps: [build]
    cmds:
      - ./tests/e2e/ms_smoke.sh {{.CLI_ARGS}}
      - ./tests/e2e/google_smoke.sh {{.CLI_ARGS}}
      - ./tests/e2e/github_smoke.sh
      - ./tests/e2e/morning_brief_smoke.sh {{.CLI_ARGS}}

  release:snapshot:
    desc: "Local smoke test of the release pipeline (no publish, no tag)."
    cmds:
      - goreleaser release --snapshot --clean --skip=publish

  release:dry-run:
    desc: "Verbose snapshot release for debugging the goreleaser config."
    cmds:
      - goreleaser release --snapshot --clean --skip=publish --verbose

  npm:bump:
    desc: "Sync npm package versions across main + 5 sub-packages. Usage: task npm:bump -- 0.1.0"
    cmds:
      - node scripts/bump-npm-version.js {{.CLI_ARGS}}

  npm:publish:
    desc: "Publish all 6 @muthuishere/apl* packages to npm (sub-packages first, then main). Requires npm whoami to succeed and binaries staged."
    cmds:
      - bash scripts/publish-npm-local.sh

  npm:publish:auto:
    desc: "Publish all 6 packages non-interactively (no OTP) — for automation tokens. Versions must be bumped and binaries staged."
    cmds:
      - npm whoami
      - cd npm/platforms/darwin-arm64 && npm publish --access public
      - cd npm/platforms/darwin-x64 && npm publish --access public
      - cd npm/platforms/linux-arm64 && npm publish --access public
      - cd npm/platforms/linux-x64 && npm publish --access public
      - cd npm/platforms/windows-x64 && npm publish --access public
      - cd npm && npm publish --access public

  release:
    desc: "Full local release: bump → build → publish → tag → push → GH release. Usage: task release -- 0.2.0"
    cmds:
      - bash scripts/release-local.sh {{.CLI_ARGS}}
