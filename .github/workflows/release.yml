name: release

# Triggered only by pushing a `v*` tag. No manual dispatch.
#
# Required secrets:
#   - NPM_TOKEN    — npm automation token with publish rights on the @muthuishere scope.
#   - GITHUB_TOKEN — auto-provided by Actions; used by goreleaser.

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create GitHub release
  id-token: write   # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: sanity — go test
        run: go test ./...

      - name: compute version (strip leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: goreleaser release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: stage binaries into npm/platforms (idempotent backup)
        run: ./scripts/prep-npm.sh

      - name: sync npm versions
        run: node scripts/bump-npm-version.js "${{ steps.ver.outputs.version }}"

      - name: publish platform sub-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          for p in npm/platforms/*/; do
            echo "publishing $p"
            npm publish "$p" --access public --provenance
          done

      - name: publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish npm/ --access public --provenance
